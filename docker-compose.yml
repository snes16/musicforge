version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  acestep:
    build:
      context: ./acestep
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./acestep/lora:/app/lora
    environment:
      - MOCK_ACESTEP=${MOCK_ACESTEP:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./audio_output:/app/audio_output
      - ./checkpoints:/app/checkpoints
    environment:
      - ACESTEP_API_URL=${ACESTEP_API_URL:-http://acestep:8001}
      - ACESTEP_API_KEY=${ACESTEP_API_KEY:-local-dev-key}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - AUDIO_OUTPUT_DIR=/app/audio_output
      - MAX_AUDIO_SIZE_MB=${MAX_AUDIO_SIZE_MB:-50}
      - MOCK_GPU=${MOCK_GPU:-true}
      - GPU_POLL_INTERVAL=${GPU_POLL_INTERVAL:-2}
      - API_SECRET_KEY=${API_SECRET_KEY:-change-me-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    volumes:
      - ./audio_output:/app/audio_output
    environment:
      - ACESTEP_API_URL=${ACESTEP_API_URL:-http://host.docker.internal:8001}
      - ACESTEP_API_KEY=${ACESTEP_API_KEY:-local-dev-key}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - AUDIO_OUTPUT_DIR=/app/audio_output
      - MOCK_GPU=${MOCK_GPU:-true}
      - MOCK_ACESTEP=${MOCK_ACESTEP:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  flower:
    image: mher/flower:2.0
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379/0}
      - FLOWER_PORT=5555
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend

volumes:
  redis_data:
