services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  acestep:
    build:
      context: ./acestep
      dockerfile: Dockerfile
    ports:
      - "${ACESTEP_PORT:-8001}:8001"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./acestep/lora:/app/lora
    environment:
      # This container is always mock — real ACE-Step runs on the host at port 8001
      - MOCK_ACESTEP=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./audio_output:/app/audio_output
      - ./checkpoints:/app/checkpoints
    environment:
      - ACESTEP_API_URL=${ACESTEP_API_URL:-http://acestep:8001}
      - ACESTEP_API_KEY=${ACESTEP_API_KEY:-local-dev-key}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - AUDIO_OUTPUT_DIR=/app/audio_output
      - MAX_AUDIO_SIZE_MB=${MAX_AUDIO_SIZE_MB:-50}
      - MOCK_GPU=${MOCK_GPU:-true}
      - MOCK_ACESTEP=${MOCK_ACESTEP:-true}
      - ACESTEP_ADAPTER_MAP=${ACESTEP_ADAPTER_MAP:-}
      - GPU_POLL_INTERVAL=${GPU_POLL_INTERVAL:-2}
      - API_SECRET_KEY=${API_SECRET_KEY:-change-me-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    volumes:
      - ./audio_output:/app/audio_output
      - /mnt/c/Users/danil/Desktop/ACE-Step-1.5/.cache/acestep/tmp/api_audio:/app/acestep_cache:ro
    environment:
      - ACESTEP_API_URL=${ACESTEP_API_URL:-http://host.docker.internal:8001}
      - ACESTEP_API_KEY=${ACESTEP_API_KEY:-local-dev-key}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - AUDIO_OUTPUT_DIR=/app/audio_output
      - ACESTEP_CACHE_DIR=/app/acestep_cache
      - MOCK_GPU=${MOCK_GPU:-true}
      - MOCK_ACESTEP=${MOCK_ACESTEP:-false}
      - ACESTEP_ADAPTER_MAP=${ACESTEP_ADAPTER_MAP:-}
      - ACESTEP_ADAPTER_DIRS=${ACESTEP_ADAPTER_DIRS:-}
      - ACESTEP_AUTO_UNLOAD_ON_BASE=${ACESTEP_AUTO_UNLOAD_ON_BASE:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  flower:
    image: mher/flower:2.0
    ports:
      - "${FLOWER_HOST_PORT:-5555}:5555"
    environment:
      - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379/0}
      - FLOWER_PORT=5555
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
        - VITE_FLOWER_URL=${VITE_FLOWER_URL:-http://localhost:5555}
        - VITE_ACESTEP_URL=${VITE_ACESTEP_URL:-http://localhost:8001}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
      - VITE_FLOWER_URL=${VITE_FLOWER_URL:-http://localhost:5555}
      - VITE_ACESTEP_URL=${VITE_ACESTEP_URL:-http://localhost:8001}
    depends_on:
      - backend

volumes:
  redis_data:
